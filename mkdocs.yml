    - Tailwind CSS概述: tailwind/overview.md
    - 基础:
      - 安装与配置: tailwind/basics/installation.md
      - 核心概念: tailwind/basics/core-concepts.md
      - 常用工具类: tailwind/basics/utility-classes.md
      - 响应式设计: tailwind/basics/responsive-design.md
    - 进阶:
      - 原理深度解析: tailwind/advanced/principles.md
      - 自定义配置: tailwind/advanced/customization.md
      - 状态变体: tailwind/advanced/state-variants.md
      - 常用组件示例: tailwind/advanced/components.md

plugins:
  - search
